# Static site — no build step. index.html lives in windrose-site/, so the publish
# directory must point there; pointing at the repo root would serve a 404.
[build]
  publish = "windrose-site"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
